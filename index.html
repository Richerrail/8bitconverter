<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>8-Bit Audio Converter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>                                                                          
/* Remplace le background existant par un fond Space Invaders 8-bit */           
body {                                                                           
    background-image: none !important;                                           
    background-color: #000 !important;                                           
    position: relative;                                                          
}                                                                                
                                                                                 
/* Pattern Space Invaders en CSS pur */                                          
body::before {                                                                   
    content: "";                                                                 
    position: fixed;                                                             
    top: 0;                                                                      
    left: 0;                                                                     
    width: 100%;                                                                 
    height: 100%;                                                                
    background:                                                                  
        linear-gradient(0deg, transparent 25%, rgba(57, 255, 20, 0.03) 25%),     
        linear-gradient(90deg, transparent 25%, rgba(57, 255, 20, 0.03) 25%);    
    background-size: 40px 40px;                                                  
    z-index: -2;                                                                 
}                                                                                
                                                                                 
body::after {                                                                    
    content: "";                                                                 
    position: fixed;                                                             
    top: 0;                                                                      
    left: 0;                                                                     
    width: 100%;                                                                 
    height: 100%;                                                                
    background-image:                                                            
        radial-gradient(circle at 50px 50px, #39FF14 8px, transparent 8px),      
        radial-gradient(circle at 200px 100px, #39FF14 8px, transparent 8px),    
        radial-gradient(circle at 350px 150px, #39FF14 8px, transparent 8px),    
        radial-gradient(circle at 500px 80px, #39FF14 8px, transparent 8px),     
        radial-gradient(circle at 650px 200px, #39FF14 8px, transparent 8px),    
        radial-gradient(circle at 800px 120px, #39FF14 8px, transparent 8px),    
        radial-gradient(circle at 950px 180px, #39FF14 8px, transparent 8px),    
        radial-gradient(circle at 1100px 90px, #39FF14 8px, transparent 8px),    
        radial-gradient(circle at 1250px 160px, #39FF14 8px, transparent 8px),   
        radial-gradient(circle at 1400px 110px, #39FF14 8px, transparent 8px),   
        radial-gradient(circle at 1550px 190px, #39FF14 8px, transparent 8px),   
        radial-gradient(circle at 1700px 130px, #39FF14 8px, transparent 8px);   
    background-repeat: repeat;                                                   
    background-size: 400px;                                                      
    opacity: 0.15;                                                               
    z-index: -1;                                                                 
    animation: twinkle 3s infinite alternate;                                    
}                                                                                
                                                                                 
@keyframes twinkle {                                                             
    0% { opacity: 0.1; }                                                         
    100% { opacity: 0.2; }                                                       
}                                                                                
</style>                                                                         
                                                                                 
<!-- Place ce code AVANT la fermeture de </body> -->                             
<script>                                                                         
document.addEventListener('DOMContentLoaded', () => {                            
    for (let i = 0; i < 20; i++) {                                               
        const invader = document.createElement('div');                           
        invader.className = 'invader';                                           
        invader.style.left = Math.random() * window.innerWidth + 'px';           
        invader.style.top = Math.random() * window.innerHeight + 'px';           
        invader.style.animation = `float ${3 + Math.random() * 4}s infinite ease-in-out`;                                                                         
        document.body.appendChild(invader);                                      
    }                                                                            
});                                                                              
                                                                                 
// Animation flottante pour les invaders                                         
const style = document.createElement('style');                                   
style.textContent = `                                                            
    .invader {                                                                   
        position: absolute;                                                      
        width: 32px;                                                             
        height: 32px;                                                            
        background-image:                                                        
            linear-gradient(0deg, #39FF14 2px, transparent 2px),                 
            linear-gradient(90deg, #39FF14 2px, transparent 2px);                
        background-size: 8px 8px;                                                
        opacity: 0.1;                                                            
    }                                                                            
                                                                                 
    @keyframes float {                                                           
        0%, 100% { transform: translateY(0) rotate(0deg); }                      
        25% { transform: translateY(-20px) rotate(5deg); }                       
        50% { transform: translateY(0) rotate(-5deg); }                          
        75% { transform: translateY(20px) rotate(3deg); }                        
    }                                                                            
`;                                                                               
document.head.appendChild(style);                                                
</script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>8-Bit Audio Converter</h1>
        <input type="file" id="audioInput" accept="audio/*" class="form-control my-3">
        
        <div class="effect-controls">
            <div>
                <label>Bit Depth</label>
                <input type="range" id="bitDepthSlider" min="1" max="16" value="8" class="form-range effect-slider">
                <span id="bitDepthValue">8 bits</span>
            </div>
            <div>
                <label>Sample Rate Reduction</label>
                <input type="range" id="sampleRateSlider" min="1" max="16" value="8" class="form-range effect-slider">
                <span id="sampleRateValue">8x</span>
            </div>
        </div>

        <button id="convertBtn" class="btn btn-primary mt-3">Pixelate Audio</button>
        <div id="progressBar" class="mt-3">
            Turning Your Audio Into An 8-bit Audio...
        </div>
        <div class="audio-container">
            <p id="inputAudioLabel" class="audio-label">Input Audio</p>
            <audio id="originalAudio" controls class="mt-3" style="display:none;"></audio>
            
            <p id="outputAudioLabel" class="audio-label">8-Bit Output Audio</p>
            <audio id="convertedAudio" controls class="mt-3" style="display:none;"></audio>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script>
        // Update existing script to reflect new default values
        document.getElementById('bitDepthSlider').addEventListener('input', function() {
            document.getElementById('bitDepthValue').textContent = `${this.value} bits`;
        });

        document.getElementById('sampleRateSlider').addEventListener('input', function() {
            document.getElementById('sampleRateValue').textContent = `${this.value}x`;
        });

        // Set initial text to match default values
        document.getElementById('bitDepthValue').textContent = '8 bits';
        document.getElementById('sampleRateValue').textContent = '8x';

        document.getElementById('audioInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const originalAudioElement = document.getElementById('originalAudio');
            const inputAudioLabel = document.getElementById('inputAudioLabel');
            
            // Add null check and type check
            if (!file || !file.type.startsWith('audio/')) {
                alert('Please select a valid audio file');
                this.value = ''; // Reset the file input
                return;
            }

            try {
                originalAudioElement.src = URL.createObjectURL(file);
                originalAudioElement.style.display = 'block';
                inputAudioLabel.style.display = 'block';
            } catch (error) {
                console.error('Error creating object URL:', error);
                alert('Error loading audio file');
                this.value = ''; // Reset the file input
            }
        });

        document.getElementById('convertBtn').addEventListener('click', async () => {
            const fileInput = document.getElementById('audioInput');
            const convertedAudioElement = document.getElementById('convertedAudio');
            const progressBar = document.getElementById('progressBar');

            if (!fileInput.files.length) {
                alert('Please upload an audio file first');
                return;
            }

            progressBar.style.display = 'block';

            const file = fileInput.files[0];
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            
            try {
                const arrayBuffer = await file.arrayBuffer();
                const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);

                // Enhanced bitcrusher conversion
                const bitDepth = parseInt(document.getElementById('bitDepthSlider').value);
                const sampleRateReduction = parseInt(document.getElementById('sampleRateSlider').value);
                const convertedBuffer = await createBitcrushedBuffer(audioContext, audioBuffer, bitDepth, sampleRateReduction, (progress) => {
                    // Optional: You could update the text to show progress if desired
                    // progressBar.textContent = `Turning Your Audio Into An 8-bit Audio... ${progress}%`;
                });

                // Convert to WAV
                const wavBlob = bufferToWave(convertedBuffer, convertedBuffer.length);
                convertedAudioElement.src = URL.createObjectURL(wavBlob);
                convertedAudioElement.style.display = 'block';
                
                // Show output audio label
                document.getElementById('outputAudioLabel').style.display = 'block';
                
                progressBar.style.display = 'none';
            } catch (error) {
                console.error('Conversion error:', error);
                alert('Error converting audio');
                progressBar.style.display = 'none';
            }
        });

        // Enhanced bitcrusher effect function
        async function createBitcrushedBuffer(audioContext, sourceBuffer, bitDepth, sampleRateReduction, progressCallback) {
            const channels = sourceBuffer.numberOfChannels;
            const sampleRate = sourceBuffer.sampleRate;
            const length = sourceBuffer.length;

            const convertedBuffer = audioContext.createBuffer(channels, length, sampleRate);

            for (let channel = 0; channel < channels; channel++) {
                const channelData = sourceBuffer.getChannelData(channel);
                const convertedChannelData = convertedBuffer.getChannelData(channel);

                for (let i = 0; i < length; i++) {
                    // Bit depth reduction
                    const step = Math.pow(2, bitDepth);
                    let sample = channelData[i];
                    
                    // Quantize the sample to reduce bit depth
                    sample = Math.round(sample * step) / step;

                    // Sample rate reduction
                    if (i % sampleRateReduction !== 0) {
                        sample = convertedChannelData[Math.floor(i / sampleRateReduction) * sampleRateReduction] || sample;
                    }

                    convertedChannelData[i] = sample;

                    // Progress callback
                    if (i % 1000 === 0) {
                        progressCallback(Math.round((i / length) * 100));
                    }
                }
            }

            return convertedBuffer;
        }

        // Existing bufferToWave function remains the same
        function bufferToWave(abuffer, len) {
            const numOfChan = abuffer.numberOfChannels;
            const length = len * numOfChan * 2 + 44;
            const buffer = new ArrayBuffer(length);
            const view = new DataView(buffer);
            const channels = []; 
            let i, sample;
            let offset = 0;
            let pos = 0;

            // Write WAV header
            setUint32(0x46464952);                         // "RIFF"
            setUint32(length - 8);                         // file length - 8
            setUint32(0x45564157);                         // "WAVE"

            setUint32(0x20746d66);                         // "fmt " chunk
            setUint32(16);                                 // length = 16
            setUint16(1);                                  // PCM (uncompressed)
            setUint16(numOfChan);
            setUint32(abuffer.sampleRate);
            setUint32(abuffer.sampleRate * 2 * numOfChan); // avg. bytes/sec
            setUint16(numOfChan * 2);                      // block-align
            setUint16(16);                                 // 16-bit (hardcoded)

            setUint32(0x61746164);                         // "data" - chunk
            setUint32(length - pos - 4);                   // chunk length

            // Write interleaved data
            for (i = 0; i < abuffer.numberOfChannels; i++)
                channels.push(abuffer.getChannelData(i));

            while (pos < length) {
                for (i = 0; i < numOfChan; i++) {             // interleave channels
                    sample = Math.max(-1, Math.min(1, channels[i][offset])); // clamp
                    sample = (0.5 + sample < 0 ? sample * 32768 : sample * 32767)|0; // scale to 16-bit signed int
                    view.setInt16(pos, sample, true);          // write 16-bit sample
                    pos += 2;
                }
                offset++; // next source sample
            }

            // Helper function to set uint
            function setUint16(data) {
                view.setUint16(pos, data, true);
                pos += 2;
            }

            function setUint32(data) {
                view.setUint32(pos, data, true);
                pos += 4;
            }

            return new Blob([buffer], { type: "audio/wav" });
        }
    </script>
</body>
</html>
